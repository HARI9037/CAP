services:
  - type: web
    name: cap-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/health"
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: CORS_ORIGINS
        value: "https://cap-mvp.vercel.app,https://cap-mvp-v2.vercel.app,https://cap-mvp.netlify.app,http://localhost:5173,http://127.0.0.1:5173"
      - key: GROQ_API_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
